version: '3'

services:
  blue:
    build: ./app
    container_name: blue
    environment:
      - APP_VERSION=BLUE

  green:
    build: ./app
    container_name: green
    environment:
      - APP_VERSION=GREEN

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blue
      - green